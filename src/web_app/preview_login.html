<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8" />
    <title>Login [PREVIEW] - AeroGT System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <style>
        body, html { height: 100%; margin: 0; font-family: 'Inter', sans-serif; overflow: hidden; }
        .bg-login {
            background-image: url('Content/img/login_bg.png');
            height: 100%; background-position: center; background-repeat: no-repeat; background-size: cover;
            display: flex; align-items: center; justify-content: center;
        }
        .bg-overlay { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: linear-gradient(135deg, rgba(13, 32, 64, 0.8) 0%, rgba(0, 0, 0, 0.4) 100%); }
        .login-card { background: rgba(255, 255, 255, 0.95); border-radius: 20px; padding: 40px; width: 100%; max-width: 450px; z-index: 10; box-shadow: 0 15px 35px rgba(0,0,0,0.3); border-top: 5px solid #c5a059; }
        .logo-text { font-family: 'Outfit', sans-serif; font-weight: 700; font-size: 2rem; color: #0d2040; }
        .gold-accent { color: #c5a059; }
        .btn-premium { background-color: #0d2040; color: white; padding: 12px; font-weight: 600; border-radius: 10px; width: 100%; }
        .btn-premium:hover { background-color: #1a3a6a; color: #c5a059; }
    </style>
</head>
<body>
    <div class="bg-login">
        <div class="bg-overlay"></div>
        <div class="login-card">
            <div class="text-center mb-4">
                <i class="bi bi-airplane-engines-fill" style="color: #c5a059; font-size: 3rem;"></i>
                <div class="logo-text">AeroGT <span class="gold-accent">System</span></div>
                <p class="text-muted small">Acceso al Centro de Control</p>
            </div>
            <div class="mb-3">
                <label class="form-label fw-bold">Usuario</label>
                <input type="text" class="form-control" value="admin_aerogt" readonly>
            </div>
            <div class="mb-4">
                <label class="form-label fw-bold">Contraseña</label>
                <input type="password" class="form-control" value="********" readonly>
            </div>
            <button class="btn btn-premium">INGRESAR (Vista Previa)</button>
        </div>
    </div>
</body>
</html>
